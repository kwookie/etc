<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainingsvolumen Rechner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Trainingsvolumen Rechner</h1>

        <div class="input-container">
            <div class="input-block">
                <label for="wochen-volumen">Wöchentliches Gesamtvolumen (Stunden:Minuten):</label>
                <input type="text" id="wochen-volumen" placeholder="z.B. 4:30">
            </div>

            <div class="input-block">
                <label for="langer-lauf">Langer Lauf (Stunden:Minuten):</label>
                <input type="text" id="langer-lauf" placeholder="z.B. 1:30">
            </div>

            <div class="input-block">
                <label for="prozent-veraenderung">Prozentuale Veränderung:</label>
                <input type="number" id="prozent-veraenderung" placeholder="z.B. 10">
            </div>

            <button id="berechnen">Berechnen</button>
        </div>

        <div class="output-container">
            <div class="output-block">
                <h3>Ergebnisse</h3>
                <p id="output-gesamt-volumen">Gesamtvolumen: </p>
                <p id="output-langer-lauf">Langer Lauf: </p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
